name: esp32_home_controller
description: "A modern Flutter app to control an ESP32-based home automation system over Classic Bluetooth (HC-05/HC-06)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Classic Bluetooth (SPP) support for HC-05/HC-06/ESP32
  flutter_bluetooth_serial: ^0.4.0

  # Runtime permission handling
  permission_handler: ^11.3.1

  # Persist last connected device
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.8

  # Nice fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
